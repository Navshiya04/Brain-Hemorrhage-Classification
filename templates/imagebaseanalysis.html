<section id="main-container" class="main-container">

      <div class="col-xl-3 col-lg-4">
        <div class="sidebar sidebar-left">
          <div class="widget">
            <h3 class="widget-title">Menu</h3>

      <div class="col-xl-8 col-lg-8">
        <div class="content-inner-page">
          <h4 class="column-title mrt-0 text-center">Brain-Hemorrhage-Classification</h4>
          <div class="row">
            <div class="col-md-6">

            <div class="card">
  					<div class="card-body">
						  <form name="form1" action="{{url_for('actionemotion')}}" method="post" enctype="multipart/form-data">
							  <div class="form-group">
								  <label class="cols-sm-2 control-label">Select MRI Brain Image:</label>   
                  <div class="custom-file">
                    <input type="file" class="custom-file-input" id="customFile" name="file" accept="image/*" required>

                  <button type="submit" class="btn btn-dark btn-block"> Classification </button>

            <div class="col-md-6">
              <div class="card">

<!-- Javascript Files
================================================== -->
<!-- initialize jQuery Library -->
<script src="../static/plugins/jQuery/jquery.min.js"></script>
<!-- Bootstrap jQuery -->
<script src="../static/plugins/bootstrap/bootstrap.min.js" defer></script>

  <!-- Slick Carousel -->
  <script src="../static/plugins/slick/slick.min.js"></script>
  <script src="../static/plugins/slick/slick-animation.min.js"></script>
  <!-- Color box -->
  <script src="../static/plugins/colorbox/jquery.colorbox.js"></script>
  <!-- shuffle -->
  <script src="../static/plugins/shuffle/shuffle.min.js" defer></script>

  <!-- Template custom -->
  <script src="../static/js/script.js"></script>

  <script>
$(".custom-file-input").on("change", function() {
  var fileName = $(this).val().split("\\").pop();
  $(this).siblings(".custom-file-label").addClass("selected").html(fileName);
});

// preview selected image
document.getElementById("customFile").addEventListener("change", function(event) {		
var fileInput = document.getElementById('customFile');
var filePath = fileInput.value;
var allowedExtensions = /(\.jpg|\.jpeg|\.png|\.gif)$/i;
if(!allowedExtensions.exec(filePath)){
   	alert('Please upload file having extensions .jpg only.');
  	fileInput.value = '';
   	return false;
}
else{
	const file = event.target.files[0];
	if (file) {
    	const reader = new FileReader();
    	reader.onload = function(e) {
			const img=document.getElementById('preview');		
        	img.src = e.target.result;        
        }
    	reader.readAsDataURL(file);
    }
}
});

</script>
